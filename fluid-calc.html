<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fluid Type Calculator</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 40px;
      max-width: 600px;
      margin: auto;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px;
      font-size: 16px;
    }
    button {
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      margin-top: 24px;
      font-size: 16px;
      line-height: 1.6;
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>Fluid Type Calculator</h1>

  <label>Min Font Size (px)</label>
  <input id="minSize" type="number" />

  <label>Max Font Size (px)</label>
  <input id="maxSize" type="number" />

   <label>Actual Max Width (rem)</label>
  <input id="designMax" type="number" value="90" />

  <label>Actual Max Width (rem)</label>
  <input id="actualMax" type="number" value="100" />

  <label>Min Width (rem)</label>
  <input id="minWidth" type="number" value="20" />

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="result"></div>

  <script>
    function pxToRem(px) {
      return px / 16;
    }

    function calculate() {
      const minPx = parseFloat(document.getElementById("minSize").value);
      const maxPx = parseFloat(document.getElementById("maxSize").value);
      const designMax = parseFloat(document.getElementById("designMax").value);
      const actualMax = parseFloat(document.getElementById("actualMax").value);
      const minWidth = parseFloat(document.getElementById("minWidth").value);

      const min = pxToRem(minPx);
      const max = pxToRem(maxPx);

      const designRange = designMax - minWidth;
      const actualRange = actualMax - minWidth;

      const scale = actualRange / designRange;

      const newMax = min + (max - min) * scale;

      document.getElementById("result").innerText =
`Min: ${min.toFixed(4)}rem
Adjusted Max: ${newMax.toFixed(4)}rem`;
    }
  </script>

</body>
</html>
